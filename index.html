<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展覽現場資料蒐集與採購媒合平台 | Expo Data & Sourcing Platform</title>
<style>
  /* ===== Design Tokens ===== */
  :root{
    /* 主色(酒紅)與色階 */
    --cherry:#990011; --cherry-600:#7e0010; --cherry-50:#fbeced; --cherry-100:#f6dadc;
    --navy:#2f3c7e; --navy-50:#eef0fb; --gold:#caa54a;
    /* 中性灰階 */
    --ink:#1f2024; --ink-2:#3f4046; --mute:#6b6e76; --mute-2:#9a9da6;
    --line:#e7e3e1; --line-2:#f0edeb; --bg:#f7f4f3; --bg-2:#fbf9f8; --card:#ffffff;
    /* 語意色 */
    --ok:#1f8a4c; --ok-bg:#e3f3e9; --warn:#b8740b; --warn-bg:#fbefd6; --danger:#c0322f; --danger-bg:#fbe4e3; --info:#2f5fb0; --info-bg:#e9f0fb;
    /* 字級階層 */
    --fs-h1:27px; --fs-h2:21px; --fs-h3:17px; --fs-sec:15px; --fs-body:13.5px; --fs-sm:12.5px; --fs-xs:11.5px;
    /* 間距尺度 */
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
    /* 圓角 / 陰影 */
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-pill:999px;
    --sh-1:0 1px 2px rgba(28,25,23,.05),0 1px 3px rgba(28,25,23,.06);
    --sh-2:0 4px 10px rgba(28,25,23,.06),0 2px 4px rgba(28,25,23,.05);
    --sh-3:0 12px 30px rgba(28,25,23,.12);
    --ring:0 0 0 3px rgba(47,60,126,.30);
    --maxw:1080px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Hiragino Sans",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;font-size:var(--fs-body)}
  :focus-visible{outline:none;box-shadow:var(--ring);border-radius:var(--r-sm)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--sp-5)}
  /* header */
  header{background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);min-height:62px;flex-wrap:wrap;padding:var(--sp-2) 0}
  .logo{font-weight:800;font-size:var(--fs-h3);color:var(--cherry);letter-spacing:.2px}.logo small{display:block;font-size:var(--fs-xs);color:var(--mute);font-weight:400;letter-spacing:0}
  .right{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap}
  .langsw{display:flex;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-1)}
  .langsw button{border:none;background:#fff;padding:6px 12px;font-size:var(--fs-sm);cursor:pointer;color:var(--mute);border-right:1px solid var(--line);transition:background .15s,color .15s}
  .langsw button:hover{background:var(--bg-2)}.langsw button:last-child{border-right:none}.langsw button.on{background:var(--cherry);color:#fff;font-weight:700}
  /* pills & badges */
  .pill{display:inline-block;font-size:var(--fs-xs);padding:2px 9px;border-radius:var(--r-pill);margin:2px 3px 0 0;font-weight:600}
  .pill.tw{background:var(--ok-bg);color:var(--ok)}.pill.cn{background:var(--danger-bg);color:var(--danger)}.pill.lv{background:var(--navy-50);color:var(--navy)}.pill.warn{background:var(--warn-bg);color:var(--warn)}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-sm);padding:4px 11px;border-radius:var(--r-pill);font-weight:700;line-height:1}
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .badge.ok{background:var(--ok-bg);color:var(--ok)}.badge.no{background:var(--danger-bg);color:var(--danger)}.badge.cond{background:var(--warn-bg);color:var(--warn)}
  .rolepill{font-size:var(--fs-sm);padding:5px 13px;border-radius:var(--r-pill);background:var(--cherry-50);color:var(--cherry);font-weight:700}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--cherry);color:#fff;border:1px solid transparent;padding:9px 17px;border-radius:var(--r-sm);font-size:var(--fs-body);cursor:pointer;font-weight:700;transition:background .15s,transform .06s,box-shadow .15s;box-shadow:var(--sh-1)}
  .btn:hover{background:var(--cherry-600);box-shadow:var(--sh-2)}.btn:active{transform:translateY(1px);box-shadow:none}
  .btn.ghost{background:#fff;color:var(--cherry);border-color:var(--cherry-100)}.btn.ghost:hover{background:var(--cherry-50)}
  .btn.navy{background:var(--navy)}.btn.navy:hover{background:#27326a}
  .btn.sm{padding:5px 12px;font-size:var(--fs-sm)}
  /* hero */
  .hero{padding:var(--sp-7) 0 var(--sp-4);text-align:center}
  .hero h1{font-size:var(--fs-h1);color:var(--cherry);font-weight:800;letter-spacing:.3px}
  .hero .sub{color:var(--mute);font-size:var(--fs-body);margin-top:var(--sp-2);max-width:680px;margin-left:auto;margin-right:auto}
  .exh{display:inline-block;margin:var(--sp-4) auto 0;background:linear-gradient(180deg,#fff,var(--bg-2));border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-5);font-size:var(--fs-body);box-shadow:var(--sh-1)}.exh b{color:var(--navy)}
  /* entry cards */
  .grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-4);margin:var(--sp-6) 0 var(--sp-7)}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:var(--sp-5);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;box-shadow:var(--sh-1);overflow:hidden}
  .entry::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:var(--cherry)}
  .entry.n1::before{background:#2f7ea0}.entry.n2::before{background:var(--cherry)}.entry.n3::before{background:#3a9d6a}.entry.n4::before{background:var(--navy)}
  .entry:hover{transform:translateY(-3px);box-shadow:var(--sh-3);border-color:var(--line)}
  .entry:focus-visible{box-shadow:var(--ring),var(--sh-2)}
  .entry .ic{font-size:30px;margin-bottom:var(--sp-2)}.entry h3{font-size:var(--fs-h3);margin-bottom:var(--sp-1);font-weight:700}.entry p{font-size:var(--fs-sm);color:var(--mute);margin-bottom:var(--sp-2);min-height:34px}
  .view{display:none}.view.active{display:block;animation:fade .22s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .portalhead{padding:var(--sp-5) 0 var(--sp-2)}.portalhead h2{font-size:var(--fs-h2);font-weight:800}
  .crumbs{font-size:var(--fs-sm);color:var(--mute);margin:var(--sp-4) 0 0}.crumbs span{color:var(--cherry);cursor:pointer}.crumbs span:hover{text-decoration:underline}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-5);margin:var(--sp-4) 0;box-shadow:var(--sh-1)}
  .card h4{font-size:var(--fs-sec);color:var(--ink);margin-bottom:var(--sp-3);padding-bottom:var(--sp-2);border-bottom:1px solid var(--line-2);font-weight:700;display:flex;align-items:center;gap:7px}
  .navy h4{color:var(--navy)}
  .note{background:var(--info-bg);border-left:3px solid var(--info);padding:var(--sp-3);font-size:var(--fs-sm);color:#2c4a82;border-radius:0 var(--r-sm) var(--r-sm) 0;margin:var(--sp-3) 0}
  .anote{background:var(--navy-50);border-left:3px solid var(--navy);color:#404063;border-radius:0 var(--r-sm) var(--r-sm) 0;padding:var(--sp-2) var(--sp-3);font-size:var(--fs-sm);margin-top:var(--sp-2)}
  /* product cards */
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:var(--sp-4)}
  .pcard{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:#fff;box-shadow:var(--sh-1);transition:transform .15s,box-shadow .15s}
  .pcard:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
  .pcard .ph{height:92px;display:flex;align-items:center;justify-content:center;font-size:42px;background:radial-gradient(circle at 50% 40%,#fff,var(--cherry-50))}.pcard .pb{padding:var(--sp-3)}
  .pcard h5{font-size:var(--fs-body);margin-bottom:var(--sp-1);font-weight:700}.pcard .meta{font-size:var(--fs-sm);color:var(--mute)}.pcard .price{color:var(--cherry);font-weight:800;font-size:var(--fs-body);margin-top:6px}.stars{color:var(--gold);font-size:var(--fs-body);letter-spacing:1px}
  /* forms */
  form.auth{max-width:380px;margin:var(--sp-3) 0}
  form.auth label{display:block;font-size:var(--fs-sm);margin-bottom:var(--sp-3);color:var(--ink-2);font-weight:600}
  form.auth input,form.auth select{width:100%;padding:10px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:var(--fs-body);margin-top:5px;font-family:inherit;background:var(--bg-2);transition:border-color .15s,box-shadow .15s;font-weight:400}
  form.auth input:focus,form.auth select:focus{outline:none;border-color:var(--navy);box-shadow:var(--ring);background:#fff}
  .msg{font-size:var(--fs-sm);padding:9px 13px;border-radius:var(--r-sm);margin:var(--sp-2) 0}.msg.err{background:var(--danger-bg);color:var(--danger)}.msg.ok{background:var(--ok-bg);color:var(--ok)}
  /* tables */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-sm);-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
  th,td{padding:9px 11px;text-align:left;vertical-align:top;border-bottom:1px solid var(--line-2)}
  th{background:var(--bg-2);font-weight:700;color:var(--ink-2);position:sticky;top:0;white-space:nowrap}
  tbody tr{transition:background .12s}tbody tr:nth-child(even){background:#fcfbfa}tbody tr:hover{background:var(--cherry-50)}
  tbody tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tabs{display:flex;gap:var(--sp-2);flex-wrap:wrap;margin:var(--sp-2) 0}
  .tabs button{border:1px solid var(--line);background:#fff;padding:7px 14px;border-radius:var(--r-sm);cursor:pointer;font-size:var(--fs-sm);font-weight:600;color:var(--ink-2);transition:.15s}
  .tabs button:hover{background:var(--bg-2)}.tabs button.on{background:var(--cherry);color:#fff;border-color:var(--cherry)}
  .yes{color:var(--ok);font-weight:700}.non{color:var(--danger)}
  /* skeleton & empty */
  .skel{background:linear-gradient(90deg,var(--line-2) 25%,#f5f2f0 37%,var(--line-2) 63%);background-size:400% 100%;animation:sk 1.3s ease infinite;border-radius:var(--r-sm)}
  @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
  .skline{height:12px;margin:8px 0}.skcard{height:150px}
  .empty{text-align:center;color:var(--mute);padding:var(--sp-6) var(--sp-4);font-size:var(--fs-sm)}.empty .ei{font-size:34px;opacity:.5;display:block;margin-bottom:var(--sp-2)}
  footer{text-align:center;color:var(--mute);font-size:var(--fs-sm);padding:var(--sp-5) 0 var(--sp-7);border-top:1px solid var(--line);margin-top:var(--sp-6)}
  @media(max-width:680px){
    :root{--maxw:100%}
    .grid4{grid-template-columns:1fr}
    .hero{padding:var(--sp-6) 0 var(--sp-3)}
    .wrap{padding:0 var(--sp-4)}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  /* chatbot */
  #botFab{position:fixed;right:22px;bottom:22px;width:56px;height:56px;border-radius:50%;border:none;background:var(--cherry);color:#fff;font-size:26px;cursor:pointer;box-shadow:0 8px 22px rgba(153,0,17,.35);z-index:60}
  #botPanel{position:fixed;right:22px;bottom:88px;width:340px;max-width:calc(100vw - 28px);height:480px;max-height:calc(100vh - 130px);background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 40px rgba(0,0,0,.18);z-index:60;display:none;flex-direction:column;overflow:hidden}
  #botPanel.open{display:flex}
  #botHead{background:var(--cherry);color:#fff;padding:12px 14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  #botX{cursor:pointer;opacity:.85}
  #botBody{flex:1;overflow-y:auto;padding:12px;background:#faf6f5;font-size:13px;display:flex;flex-direction:column;gap:8px}
  .bmsg{max-width:85%;padding:8px 11px;border-radius:12px;white-space:pre-wrap;line-height:1.5}
  .bmsg.bot{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:3px}
  .bmsg.me{background:var(--navy);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
  #botChips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 10px;border-top:1px solid var(--line);background:#fff}
  #botChips button{font-size:11.5px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:4px 10px;cursor:pointer;color:var(--navy)}
  #botInput{display:flex;gap:6px;padding:10px;border-top:1px solid var(--line)}
  #botText{flex:1;padding:9px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit}
  #botSend{border:none;background:var(--cherry);color:#fff;border-radius:9px;padding:0 14px;cursor:pointer;font-size:15px}
  @media(max-width:680px){#botPanel{right:8px;left:8px;width:auto}}
</style>
</head>
<body>
<header><div class="wrap bar">
  <div class="logo" id="logo"></div>
  <div class="right"><div class="langsw" id="langsw"></div><div id="rolebox"></div></div>
</div></header>
<div class="wrap">
  <section id="v-home" class="view active"></section>
  <section id="v-exhibitor" class="view"></section>
  <section id="v-buyer" class="view"></section>
  <section id="v-consumer" class="view"></section>
  <section id="v-admin" class="view"></section>
</div>
<footer><div class="wrap" id="foot"></div></footer>

<!-- 機器人問答 widget -->
<button id="botFab" onclick="toggleBot()" aria-label="chat">🤖</button>
<div id="botPanel">
  <div id="botHead"><span id="botTitle">🤖</span><span id="botX" onclick="toggleBot()">✕</span></div>
  <div id="botBody"></div>
  <div id="botChips"></div>
  <div id="botInput">
    <input id="botText" type="text" onkeydown="if(event.key==='Enter')sendBot()" autocomplete="off">
    <button onclick="sendBot()" id="botSend">➤</button>
  </div>
</div>

<script src="i18n.js"></script>
<script>
const API = ''; // 同源
let LANG = localStorage.getItem('expoLang') || 'tc';
let VIEW = 'home';
let TOKEN = localStorage.getItem('expoToken') || null;
let USER = null;
const t = o => (o && o[LANG] !== undefined) ? o[LANG] : (o||'');
const $ = id => document.getElementById(id);
const stars = n => '★'.repeat(n||0)+'☆'.repeat(5-(n||0));

async function api(path, opts={}) {
  const h = Object.assign({ 'content-type':'application/json' }, opts.headers||{});
  if (TOKEN) h.authorization = 'Bearer ' + TOKEN;
  const r = await fetch(API+path, Object.assign({}, opts, { headers:h }));
  let j=null; try{ j=await r.json(); }catch{}
  return { status:r.status, body:j };
}
function setLang(l){ LANG=l; localStorage.setItem('expoLang',l); render(); }
function go(v){ VIEW=v; render(); location.hash=v; window.scrollTo(0,0); }
function logout(){ TOKEN=null; USER=null; localStorage.removeItem('expoToken'); go('home'); }

function header(){
  $('logo').innerHTML = `${t(I18N.brand)}<small>${I18N.brandSub}</small>`;
  $('langsw').innerHTML = ['tc','sc','ja','en'].map(l=>`<button class="${l===LANG?'on':''}" onclick="setLang('${l}')">${I18N.langNames[l]}</button>`).join('');
  const rb=$('rolebox');
  if(USER){ rb.innerHTML=`<span class="rolepill">${USER.role} ${USER.client_id?('·'+USER.client_id):''}</span> <button class="btn ghost sm" onclick="logout()">${t(I18N.logout)}</button>`; }
  else if(VIEW!=='home'){ rb.innerHTML=`<button class="btn ghost sm" onclick="go('home')">${t(I18N.back)}</button>`; }
  else rb.innerHTML='';
  $('foot').innerHTML = `${I18N.brandSub}　|　Phase ① 視覺系統化 + Phase ② 權限隔離 · v3`;
}

async function renderHome(){
  let ex=''; try{ const r=await api('/api/exhibition'); if(r.body) ex=`<div class="exh"><b>${t(r.body.name)}</b><br>${r.body.date} ｜ ${t(r.body.venue)} ｜ ${r.body.organizer} ｜ ${t(r.body.scale)}</div>`; }catch{}
  const cards=I18N.entries.map(e=>`<div class="entry ${e.cls}" role="button" tabindex="0" aria-label="${t(e.title)}" onclick="go('${e.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();go('${e.id}')}">
    <div class="ic" aria-hidden="true">${e.ic}</div><h3>${t(e.title)}</h3><p>${t(e.desc)}</p>
    <span class="badge ${e.auth?'cond':'ok'}">${e.auth?t(I18N.loginBadge):t(I18N.anonBadge)}</span></div>`).join('');
  $('v-home').innerHTML=`<div class="hero"><h1>${t(I18N.chooseTitle)}</h1><div class="sub">${t(I18N.chooseSub)}</div>${ex}</div><div class="grid4">${cards}</div>`;
}

function authForm(role){
  const isBuyer = role==='buyer';
  return `<div class="card"><h4>${t(I18N.login)} / ${t(I18N.register)}</h4>
    <div id="authMsg"></div>
    <form class="auth" onsubmit="return doLogin(event)">
      <label>${t(I18N.email)}<input id="le" type="email" required></label>
      <label>${t(I18N.password)}<input id="lp" type="password" required></label>
      <button class="btn" type="submit">${t(I18N.login)}</button>
    </form>
    <details style="margin-top:8px"><summary style="cursor:pointer;font-size:13px;color:var(--navy)">${t(I18N.register)}</summary>
      <form class="auth" onsubmit="return doRegister(event,'${role}')" style="margin-top:10px">
        <label>${t(I18N.email)}<input id="re" type="email" required></label>
        <label>${t(I18N.password)}<input id="rp" type="password" minlength="8" required></label>
        ${isBuyer?`<label>${t(I18N.clientCode)}<input id="rc" placeholder="A / B / C"></label>`:''}
        <button class="btn navy" type="submit">${t(I18N.register)}</button>
      </form></details></div>`;
}
async function doLogin(e){ e.preventDefault();
  const r=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:le.value,password:lp.value})});
  const m=$('authMsg');
  if(r.status===200){ TOKEN=r.body.token; USER=r.body.user; localStorage.setItem('expoToken',TOKEN);
    if(USER.role==='admin')go('admin'); else if(USER.role==='buyer')go('buyer'); else go('exhibitor'); }
  else if(r.status===403){ m.innerHTML=`<div class="msg err">${t(I18N.notApproved)}</div>`; }
  else { m.innerHTML=`<div class="msg err">${t(I18N.badCred)}</div>`; }
  return false;
}
async function doRegister(e,role){ e.preventDefault();
  const body={email:re.value,password:rp.value,role,lang:LANG};
  if(role==='buyer'&&document.getElementById('rc'))body.client_id=(rc.value||'').trim().toUpperCase()||null;
  const r=await api('/api/auth/register',{method:'POST',body:JSON.stringify(body)});
  const m=$('authMsg');
  m.innerHTML = r.status===200 ? `<div class="msg ok">${t(I18N.pendingMsg)}</div>` : `<div class="msg err">${(r.body&&r.body.error)||'error'}</div>`;
  return false;
}

const skelGrid = n => `<div class="plist">${Array(n||4).fill('<div class="pcard"><div class="ph skel skcard" style="height:92px;border-radius:0"></div><div class="pb"><div class="skel skline" style="width:70%"></div><div class="skel skline" style="width:90%"></div><div class="skel skline" style="width:50%"></div></div></div>').join('')}</div>`;
async function renderConsumer(){
  $('v-consumer').innerHTML=`<div class="portalhead"><h2>🛍️ ${t(I18N.entries[2].title)}</h2></div>${skelGrid(5)}`;
  const r=await api('/api/products'); // 匿名 L1
  const cards=(r.body||[]).map(p=>{const c=p.consumer;return `<div class="pcard"><div class="ph">${c.image}</div><div class="pb">
    <h5>${t(p.name)}</h5><div class="meta">${t(c.origin)}</div>
    <div style="font-size:12px;margin-top:6px">${t(c.story)}</div>
    <div style="font-size:12px;color:var(--mute);margin-top:4px">${t(I18N.feature)}${t(c.feature)}</div>
    <div class="price">${t(c.price)}</div></div></div>`;}).join('');
  const list = cards || `<div class="empty"><span class="ei">📭</span>—</div>`;
  $('v-consumer').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 🛍️</div>
    <div class="portalhead"><h2>🛍️ ${t(I18N.entries[2].title)}</h2></div>
    <div class="note">${t(I18N.consumerNote)}</div><div class="plist">${list}</div>`;
}

async function renderBuyer(){
  if(!USER||USER.role!=='buyer'){ $('v-buyer').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 📋</div><div class="portalhead"><h2>📋 ${t(I18N.entries[1].title)}</h2></div>${authForm('buyer')}`; return; }
  const r=await api('/api/buyer/products');
  const cards=(r.body||[]).map(p=>{const c=p.consumer,d=p.b2b;return `<div class="pcard"><div class="ph">${c.image}</div><div class="pb">
    <h5>${t(p.name)}</h5><div class="stars">${stars(d.recommend)}</div>
    <div style="font-size:12px;margin-top:6px">
      <div>${t(I18N.moq)}:<b>${t(d.moq)}</b></div>
      <div>${t(I18N.wholesale)}:<b style="color:var(--cherry)">${t(d.wholesale)}</b></div>
      <div>${t(I18N.exportL)}:${t(d.exportT)}</div><div>${t(I18N.oem)}:${t(d.oem)}</div></div>
    <div style="margin-top:6px">${d.fit_tw?`<span class="pill tw">${t(I18N.fitTw)}</span>`:''}${d.fit_cn?`<span class="pill cn">${t(I18N.fitCn)}</span>`:''}</div>
    <div class="anote">${t(I18N.adminNote)}${t(d.adminNote)}</div></div></div>`;}).join('');
  const list = cards || `<div class="empty"><span class="ei">🔒</span>${t(L('目前沒有開放給你的授權商品','目前没有开放给你的授权商品','許可された商品はまだありません','No products authorized to you yet.'))}</div>`;
  $('v-buyer').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 📋</div>
    <div class="portalhead"><h2>📋 ${t(I18N.entries[1].title)} · ${USER.client_id||'-'}</h2></div>
    <div class="plist">${list}</div>`;
}

async function renderExhibitor(){
  if(!USER||USER.role!=='exhibitor'){ $('v-exhibitor').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 🏭</div><div class="portalhead"><h2>🏭 ${t(I18N.entries[0].title)}</h2></div>${authForm('exhibitor')}`; return; }
  $('v-exhibitor').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 🏭</div>
    <div class="portalhead"><h2>🏭 ${t(I18N.entries[0].title)}</h2></div><div class="note">${t(I18N.exhibitorNote)}</div>`;
}

let adminTab='products';
async function renderAdmin(){
  if(!USER||USER.role!=='admin'){ $('v-admin').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 🛠️</div><div class="portalhead"><h2>🛠️ ${t(I18N.entries[3].title)}</h2></div>${authForm('admin-x')}`;
    // 管理人也用同一登入表單(註冊區塊不適用,但登入可用)
    return; }
  const tabs=[['products',I18N.tabProducts],['users',I18N.tabUsers],['audit',I18N.tabAudit]];
  let body='';
  const wrap = (head, rows) => rows ? `<div class="tablewrap"><table>${head}<tbody>${rows}</tbody></table></div>` : `<div class="empty"><span class="ei">📭</span>—</div>`;
  if(adminTab==='products'){
    const r=await api('/api/admin/products');
    const head=`<thead><tr><th>${t(I18N.entries[0].title)}</th><th class="num">${t(I18N.wholesale)}</th><th>${t(I18N.internal)}</th><th>${t(I18N.grantedTo)}</th></tr></thead>`;
    const rows=(r.body||[]).map(p=>`<tr><td><b>${t(p.name)}</b>${p.reviewed?'':' <span class="pill warn">●</span>'}</td>
        <td class="num"><b style="color:var(--cherry)">${t(p.b2b.wholesale)}</b></td>
        <td><div class="anote">${t(p.admin.verbal)}｜${t(p.admin.risk)}｜興趣:${(p.admin.interested||[]).join(',')}</div></td>
        <td>${(p.grantedTo||[]).map(c=>`<span class="pill lv">${c}</span>`).join('')||'—'}</td></tr>`).join('');
    body=wrap(head,rows);
  } else if(adminTab==='users'){
    const r=await api('/api/admin/users');
    const head=`<thead><tr><th>${t(I18N.email)}</th><th>${t(I18N.role)}</th><th>client</th><th>${t(I18N.status)}</th><th></th></tr></thead>`;
    const rows=(r.body||[]).map(u=>`<tr><td>${u.email}</td><td>${u.role}</td><td>${u.client_id||'-'}</td>
        <td><span class="badge ${u.status==='approved'?'ok':u.status==='pending'?'cond':'no'}">${u.status}</span></td>
        <td style="white-space:nowrap">${u.status==='pending'?`<button class="btn sm" onclick="userAction(${u.id},'approve')">${t(I18N.approve)}</button> <button class="btn ghost sm" onclick="userAction(${u.id},'reject')">${t(I18N.reject)}</button>`:''}</td></tr>`).join('');
    body=wrap(head,rows);
  } else {
    const r=await api('/api/admin/audit');
    const head=`<thead><tr><th>time</th><th class="num">actor</th><th>action</th><th>target</th></tr></thead>`;
    const rows=(r.body||[]).map(a=>`<tr><td style="font-size:11px;white-space:nowrap">${(a.created_at||'').toString().slice(0,19).replace('T',' ')}</td><td class="num">${a.actor||'-'}</td><td>${a.action}</td><td>${a.target||''}</td></tr>`).join('');
    body=wrap(head,rows);
  }
  $('v-admin').innerHTML=`<div class="crumbs"><span onclick="go('home')">${t(I18N.back)}</span> / 🛠️</div>
    <div class="portalhead"><h2>🛠️ ${t(I18N.entries[3].title)}</h2></div>
    <div class="tabs">${tabs.map(([k,lbl])=>`<button class="${k===adminTab?'on':''}" onclick="adminTab='${k}';render()">${t(lbl)}</button>`).join('')}</div>
    <div class="card">${body}</div>`;
}
async function userAction(id,action){ await api(`/api/admin/users/${id}/${action}`,{method:'POST'}); render(); }

async function render(){
  ['home','exhibitor','buyer','consumer','admin'].forEach(v=>$('v-'+v).classList.toggle('active',v===VIEW));
  header();
  if(VIEW==='home')await renderHome();
  else if(VIEW==='consumer')await renderConsumer();
  else if(VIEW==='buyer')await renderBuyer();
  else if(VIEW==='exhibitor')await renderExhibitor();
  else if(VIEW==='admin')await renderAdmin();
  botLabels();
}

/* ---------- 機器人 widget ---------- */
let botOpened=false;
function botLabels(){
  $('botTitle').textContent='🤖 '+t(I18N.bot.title);
  $('botText').placeholder=t(I18N.bot.placeholder);
  $('botChips').innerHTML=t(I18N.bot.chips).map(c=>`<button onclick="botChip('${c.replace(/'/g,"")}')">${c}</button>`).join('');
}
function toggleBot(){
  botOpened=!botOpened;
  $('botPanel').classList.toggle('open',botOpened);
  if(botOpened && !$('botBody').dataset.init){ addBot(t(I18N.bot.welcome)); $('botBody').dataset.init='1'; $('botText').focus(); }
}
function addBot(text){ const d=document.createElement('div'); d.className='bmsg bot'; d.textContent=text; $('botBody').appendChild(d); $('botBody').scrollTop=$('botBody').scrollHeight; }
function addMe(text){ const d=document.createElement('div'); d.className='bmsg me'; d.textContent=text; $('botBody').appendChild(d); $('botBody').scrollTop=$('botBody').scrollHeight; }
function botChip(txt){ $('botText').value=txt; sendBot(); }
async function sendBot(){
  const v=$('botText').value.trim(); if(!v) return;
  addMe(v); $('botText').value='';
  const typing=document.createElement('div'); typing.className='bmsg bot'; typing.textContent='…'; $('botBody').appendChild(typing);
  try{
    const r=await api('/api/chat',{method:'POST',body:JSON.stringify({message:v,lang:LANG})});
    typing.remove();
    addBot((r.body&&r.body.reply)|| '⚠️');
  }catch(e){ typing.remove(); addBot('⚠️'); }
}
(async()=>{
  if(TOKEN){ const r=await api('/api/me'); if(r.status===200&&r.body){USER=r.body;} else {TOKEN=null;localStorage.removeItem('expoToken');} }
  const h=location.hash.replace('#',''); if(['home','exhibitor','buyer','consumer','admin'].includes(h))VIEW=h;
  render();
})();
</script>
</body>
</html>
